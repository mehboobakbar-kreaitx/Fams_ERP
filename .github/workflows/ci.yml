name: FAMS CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/fams-api
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/fams-frontend

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: fams_test
          POSTGRES_USER: fams_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Restore NuGet packages
        run: dotnet restore FAMS.slnx

      - name: Build solution
        run: dotnet build FAMS.slnx --no-restore -c Release

      - name: Run unit tests
        run: dotnet test tests/FAMS.UnitTests/FAMS.UnitTests.csproj --no-build -c Release --collect:"XPlat Code Coverage" --results-directory ./coverage

      - name: Run integration tests
        run: dotnet test tests/FAMS.IntegrationTests/FAMS.IntegrationTests.csproj --no-build -c Release
        env:
          ConnectionStrings__DefaultConnection: Host=localhost;Port=5432;Database=fams_test;Username=fams_user;Password=test_password

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          directory: ./coverage

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Test frontend
        working-directory: frontend
        run: npx vitest run

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  security-scan:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy scan on API image
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ${{ env.API_IMAGE }}:${{ github.sha }}
          format: sarif
          output: trivy-api.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-api.sarif

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: FAMS.API/Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [docker-build, security-scan]
    if: github.ref == 'refs/heads/main'
    environment: staging

    steps:
      - name: Deploy to Azure Container Apps
        run: |
          echo "Deploying ${{ github.sha }} to staging..."
          # az containerapp update --name fams-api --resource-group fams-rg --image ${{ env.API_IMAGE }}:${{ github.sha }}
          echo "Add Azure credentials and uncomment the az command above."
