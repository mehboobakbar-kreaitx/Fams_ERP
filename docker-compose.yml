version: '3.9'

services:

  fams-api:
    build:
      context: .
      dockerfile: FAMS.API/Dockerfile
    container_name: fams-api
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - Redis__Connection=redis:6379
      - Minio__Endpoint=http://minio:9000
      - Minio__AccessKey=${MINIO_ROOT_USER}
      - Minio__SecretKey=${MINIO_ROOT_PASSWORD}
      - Seq__Url=http://seq:5341
      - Jwt__SecretKey=${JWT_SECRET_KEY}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
      - Jwt__AccessTokenExpiryMinutes=${JWT_ACCESS_TOKEN_EXPIRY_MINUTES}
      - Anthropic__ApiKey=${ANTHROPIC_API_KEY}
      - Anthropic__Model=${ANTHROPIC_MODEL}
      - Smtp__Host=${SMTP_HOST}
      - Smtp__Port=${SMTP_PORT}
      - Smtp__Username=${SMTP_USERNAME}
      - Smtp__Password=${SMTP_PASSWORD}
      - Cors__AllowedOrigins=${CORS_ALLOWED_ORIGINS}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      seq:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - fams-net

  fams-gateway:
    build:
      context: .
      dockerfile: FAMS.Gateway/Dockerfile
    container_name: fams-gateway
    ports:
      - "8080:8080"
    depends_on:
      - fams-api
    restart: unless-stopped
    networks:
      - fams-net

  fams-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fams-frontend
    expose:
      - "80"
    depends_on:
      - fams-api
    restart: unless-stopped
    networks:
      - fams-net

  postgres:
    image: postgres:16-alpine
    container_name: fams-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - fams-net

  redis:
    image: redis:7-alpine
    container_name: fams-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - fams-net

  minio:
    image: minio/minio:latest
    container_name: fams-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - fams-net

  minio-init:
    image: minio/mc:latest
    container_name: fams-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing myminio/fams-documents;
      mc mb --ignore-existing myminio/fams-exports;
      mc mb --ignore-existing myminio/fams-avatars;
      exit 0;
      "
    networks:
      - fams-net

  seq:
    image: datalust/seq:latest
    container_name: fams-seq
    ports:
      - "5341:5341"
      - "8081:80"
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_NOAUTHENTICATION: "true"
    volumes:
      - seq_data:/data
    restart: unless-stopped
    networks:
      - fams-net

  prometheus:
    image: prom/prometheus:latest
    container_name: fams-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped
    networks:
      - fams-net

  grafana:
    image: grafana/grafana:latest
    container_name: fams-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    restart: unless-stopped
    networks:
      - fams-net

  postgres-backup:
    image: prodrigestivill/postgres-backup-local:16
    container_name: fams-pg-backup
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_EXTRA_OPTS: "-Z9 --schema=public --blobs"
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: "90"
      BACKUP_KEEP_WEEKS: "12"
      BACKUP_KEEP_MONTHS: "12"
      HEALTHCHECK_PORT: "8080"
    volumes:
      - postgres_backups:/backups
    restart: unless-stopped
    networks:
      - fams-net

volumes:
  postgres_data:
  postgres_backups:
  redis_data:
  minio_data:
  seq_data:
  grafana_data:

networks:
  fams-net:
    driver: bridge
