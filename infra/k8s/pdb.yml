apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: fams-api-pdb
  namespace: fams
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: fams-api
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: fams-gateway-pdb
  namespace: fams
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: fams-gateway
