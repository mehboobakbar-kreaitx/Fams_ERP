apiVersion: apps/v1
kind: Deployment
metadata:
  name: fams-api
  labels:
    app: fams-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fams-api
  template:
    metadata:
      labels:
        app: fams-api
    spec:
      containers:
        - name: fams-api
          image: ghcr.io/your-org/fams-api:latest
          ports:
            - containerPort: 5000
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
