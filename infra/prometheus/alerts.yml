groups:
  - name: fams_api
    rules:
      - alert: ApiDown
        expr: up{job="fams-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "FAMS API is down"
          description: "The FAMS API has been unreachable for more than 1 minute."

      - alert: HighErrorRate
        expr: |
          sum(rate(http_requests_received_total{code=~"5.."}[5m]))
          /
          sum(rate(http_requests_received_total[5m])) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High HTTP 5xx error rate ({{ $value | humanizePercentage }})"
          description: "More than 5% of requests are returning 5xx errors over the last 5 minutes."

      - alert: HighRequestLatency
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_request_duration_seconds_bucket[5m])) by (le)
          ) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "P95 request latency above 2s"
          description: "95th percentile request latency is {{ $value }}s — above the 2s SLO."

      - alert: HealthCheckFailing
        expr: |
          aspnetcore_healthcheck_status{name="database"} != 1
          or aspnetcore_healthcheck_status{name="redis"} != 1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Health check '{{ $labels.name }}' is failing"
          description: "The {{ $labels.name }} health check has been unhealthy for more than 2 minutes."
